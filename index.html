<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tracker-container">
        <h2>Expense Tracker</h2>
        
        <div class="input-group">
            <label for="expenseName">Expense Name:</label>
            <input type="text" id="expenseName" placeholder="e.g., Groceries">
        </div>
        
        <div class="input-group">
            <label for="expenseAmount">Price per Item ($):</label>
            <input type="number" id="expenseAmount" min="0" step="0.01" placeholder="0.00">
        </div>

        <div class="input-group">
            <label for="expenseQty">Quantity:</label>
            <input type="number" id="expenseQty" min="1" value="1" placeholder="1">
        </div>
        
        <button onclick="addExpense()" class="btn-add">Add Expense</button>
        
        <div class="status-bar">
            <span>Total Items: <strong id="itemCount">0</strong></span>
        </div>
        
        <h3>Expenses List</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expenseList">
                    </tbody>
            </table>
        </div>
        
        <h3 class="total-display">
            Grand Total: $<span id="totalExpenses">0.00</span>
        </h3>
    </div>
    <script src="script.js"></script>
</body>
</html>
